<html>
	<head>
		<title>kotke.de</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
	</head>
	<body class="is-preload">
		<div id="wrapper">
			<div id="bg"></div>
			<div id="overlay"></div>
			<div id="main">

				<!-- Header -->
					<header id="header">
						<h1>kotke.de</h1>
						<br><br><br>
						<section id="zitat-box">
							<blockquote id="quote">
								Lade Zitat...
							</blockquote>

							<p id="author"></p>

							<button id="reload-btn" aria-label="Neues Zitat laden">
								⟳
							</button>
						</section>
					</header>

				<!-- Footer -->
					<footer id="footer">
						<span class="copyright">&copy; kotke.de Design: <a href="http://html5up.net">HTML5 UP</a>.</span>
					</footer>

			</div>
		</div>
		<script>
			window.onload = function() { document.body.classList.remove('is-preload'); }
			window.ontouchmove = function() { return false; }
			window.onorientationchange = function() { document.body.scrollTop = 0; }
		</script>
		<script>
			async function ladeZitat() {
				try {
					const response = await fetch(
						'https://api.zitat-service.de/v1/quote?language=de'
					);

					const data = await response.json();

					document.getElementById('quote').textContent =
						'„' + data.quote + '“';

					document.getElementById('author').textContent =
						data.author
							? '— ' + data.author
							: '';

				} catch (error) {
					document.getElementById('quote').textContent =
						'Zitat konnte nicht geladen werden.';
					document.getElementById('author').textContent = '';
				}
			}

			document
				.getElementById('reload-btn')
				.addEventListener('click', ladeZitat);
			ladeZitat();
			</script>
	</body>
</html>
