<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>Schwimmen — Lebenszähler</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#07231A">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Schwimmen">
<meta name="mobile-web-app-capable" content="yes">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="topbar-titles">
      <h1 class="topbar-title">Schwimmen</h1>
      <p class="topbar-subtitle" id="topbar-subtitle"></p>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" id="nav-newround-btn" type="button" aria-label="Neue Runde" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11a8 8 0 0 0-14.9-4"/><path d="M4 4v4h4"/><path d="M4 13a8 8 0 0 0 14.9 4"/><path d="M20 20v-4h-4"/></svg>
      </button>
      <button class="icon-btn" id="nav-overview-btn" type="button" aria-label="Übersicht">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="20" x2="5" y2="12"/><line x1="12" y1="20" x2="12" y2="5"/><line x1="19" y1="20" x2="19" y2="15"/></svg>
      </button>
    </div>
  </div>
</header>

<main class="content">
  <!-- LOBBY -->
  <section id="lobby-screen" class="screen">

    <div class="section">
      <p class="section-label">Startleben pro Spieler</p>
      <div class="stepper-pill">
        <span class="stepper-label">Leben</span>
        <div class="stepper-controls">
          <button class="stepper-btn" id="lives-minus" type="button" aria-label="Weniger Startleben">−</button>
          <span class="stepper-value" id="lives-value">3</span>
          <button class="stepper-btn" id="lives-plus" type="button" aria-label="Mehr Startleben">+</button>
        </div>
      </div>
    </div>

    <div class="section">
      <p class="section-label">Rundenende</p>
      <div class="segmented" id="mode-toggle">
        <div class="segmented-thumb"></div>
        <button type="button" class="segmented-btn" id="mode-last-btn" data-mode="last">Letzter übrig</button>
        <button type="button" class="segmented-btn" id="mode-firstout-btn" data-mode="firstOut">Erster ohne Leben</button>
      </div>
      <p class="mode-hint" id="mode-hint"></p>
    </div>

    <div class="section">
      <p class="section-label">Spieler</p>
      <div class="add-row">
        <button class="plus-circle" id="add-player-btn" type="button" aria-label="Spieler hinzufügen">+</button>
        <input type="text" id="player-input" placeholder="Name eingeben…" maxlength="20">
      </div>
      <ul class="ios-list" id="player-list"></ul>
      <p class="section-footnote" id="lobby-hint"></p>
    </div>

    <button class="primary-btn" id="start-btn" disabled>Spiel starten</button>

    <div class="btn-stack" id="lobby-secondary-btns" style="display:none;">
      <button class="text-btn destructive" id="lobby-reset-all-btn" type="button">Alles zurücksetzen</button>
    </div>
  </section>

  <!-- GAME -->
  <section id="game-screen" class="screen" style="display:none;">
    <div class="tiles" id="tiles"></div>
  </section>
</main>

<!-- OVERVIEW SHEET -->
<div class="sheet-backdrop" id="overview-backdrop"></div>
<div class="sheet" id="overview-sheet">
  <div class="sheet-grabber"></div>
  <div class="sheet-header">
    <h2 class="sheet-title">Übersicht</h2>
    <button class="sheet-close" id="overview-close-btn" type="button" aria-label="Schließen">✕</button>
  </div>
  <table class="stats-table" id="stats-table">
    <thead>
      <tr>
        <th>Spieler</th>
        <th class="num">Siege</th>
        <th class="num">Verlorene Runden</th>
      </tr>
    </thead>
    <tbody id="stats-tbody"></tbody>
  </table>
  <p class="empty-hint" id="stats-empty-hint" style="display:none;">Noch keine Runde gespielt.</p>

  <div class="btn-stack">
    <button class="text-btn" id="overview-reset-stats-btn" type="button">Statistik zurücksetzen</button>
    <button class="text-btn destructive" id="overview-reset-all-btn" type="button">Alles zurücksetzen</button>
  </div>
</div>

<!-- WINNER SHEET -->
<div class="sheet-backdrop" id="winner-backdrop"></div>
<div class="sheet" id="winner-sheet">
  <div class="sheet-grabber"></div>
  <div class="winner-body">
    <div class="winner-eyebrow" id="winner-eyebrow">Letzter am Tisch</div>
    <h2 class="winner-name" id="winner-name">—</h2>
    <p class="winner-sub" id="winner-sub"></p>
  </div>
  <div class="btn-stack">
    <button class="primary-btn" id="winner-newround-btn" type="button">Neue Runde</button>
    <button class="text-btn" id="winner-overview-btn" type="button">Übersicht</button>
  </div>
</div>

<script type="module" src="js/main.js"></script>

</body>
</html>
