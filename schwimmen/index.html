<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>Schwimmen — Lebenszähler</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#07231A">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Schwimmen">
<meta name="mobile-web-app-capable" content="yes">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#07231A;
    --surface: rgba(255,255,255,0.055);
    --surface-2: rgba(255,255,255,0.09);
    --surface-3: rgba(255,255,255,0.13);
    --hairline: rgba(255,255,255,0.13);
    --cream:#F3ECDD;
    --cream-dim: rgba(243,236,221,0.56);
    --cream-faint: rgba(243,236,221,0.34);
    --ink:#12261D;
    --brass:#C9A227;
    --brass-bright:#E7C761;
    --red:#FF453A;
    --green:#32D74B;
    --nav-h: 52px;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html{ height:100%; }
  body{
    margin:0;
    min-height:100%;
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(255,255,255,0.05), transparent 60%),
      var(--bg);
    color:var(--cream);
    font-family:-apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  button, input{ font-family:inherit; }
  button{ touch-action:manipulation; user-select:none; -webkit-user-select:none; }
  ::selection{ background:rgba(201,162,39,0.35); }

  /* ---------- top bar ---------- */
  .topbar{
    position:fixed; top:0; left:0; right:0; z-index:20;
    padding-top:env(safe-area-inset-top);
    background:rgba(7,35,26,0.72);
    -webkit-backdrop-filter:blur(20px) saturate(160%);
    backdrop-filter:blur(20px) saturate(160%);
    border-bottom:1px solid var(--hairline);
  }
  .topbar-inner{
    height:var(--nav-h);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 16px;
    max-width:760px; margin:0 auto;
  }
  .topbar-titles{ display:flex; flex-direction:column; justify-content:center; min-width:0; }
  .topbar-title{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:19px;
    margin:0;
    letter-spacing:0.1px;
    line-height:1.1;
  }
  .topbar-subtitle{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    color:var(--cream-dim);
    margin:1px 0 0;
    letter-spacing:0.2px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .topbar-actions{ display:flex; align-items:center; gap:4px; flex-shrink:0; }

  .icon-btn{
    width:34px; height:34px;
    border-radius:50%;
    border:none;
    background:var(--surface-2);
    color:var(--cream);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition:background .15s ease, transform .1s ease;
  }
  .icon-btn:active{ transform:scale(0.9); background:var(--surface-3); }
  .icon-btn svg{ width:18px; height:18px; }

  .content{
    max-width:760px; margin:0 auto;
    padding: calc(var(--nav-h) + env(safe-area-inset-top) + 20px) 16px calc(48px + env(safe-area-inset-bottom));
  }

  .screen{ animation:screenIn .32s cubic-bezier(.36,.66,.04,1); }
  @keyframes screenIn{
    from{ opacity:0; transform:translateY(8px); }
    to{ opacity:1; transform:translateY(0); }
  }

  /* ---------- section / grouped list look ---------- */
  .section{ margin-bottom:28px; }
  .section-label{
    font-size:12px; font-weight:600;
    text-transform:uppercase; letter-spacing:0.6px;
    color:var(--cream-faint);
    margin:0 0 8px 4px;
  }
  .section-footnote{
    font-size:12.5px; color:var(--cream-faint);
    margin:8px 4px 0; line-height:1.4;
  }

  .card{
    background:var(--surface);
    border:1px solid var(--hairline);
    border-radius:16px;
  }

  /* ---------- stepper ---------- */
  .stepper-pill{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--surface); border:1px solid var(--hairline);
    border-radius:14px; padding:6px 6px;
  }
  .stepper-label{ font-size:15px; font-weight:500; padding-left:10px; }
  .stepper-controls{ display:flex; align-items:center; gap:2px; }
  .stepper-btn{
    width:36px; height:36px; border-radius:50%;
    border:none; background:var(--surface-2); color:var(--cream);
    font-size:19px; cursor:pointer; line-height:1;
    display:flex; align-items:center; justify-content:center;
    transition:background .15s ease, transform .08s ease;
  }
  .stepper-btn:active{ transform:scale(0.88); background:var(--surface-3); }
  .stepper-value{
    font-family:'IBM Plex Mono', monospace; font-weight:600; font-size:17px;
    min-width:30px; text-align:center; color:var(--brass-bright);
  }

  /* ---------- segmented control ---------- */
  .segmented{
    position:relative;
    display:flex;
    background:var(--surface);
    border:1px solid var(--hairline);
    border-radius:12px;
    padding:3px;
  }
  .segmented-thumb{
    position:absolute; top:3px; bottom:3px; left:3px;
    width:calc(50% - 3px);
    background:var(--surface-3);
    border:1px solid rgba(255,255,255,0.16);
    border-radius:9px;
    transition:transform .32s cubic-bezier(.36,.66,.04,1);
  }
  .segmented.mode-firstOut .segmented-thumb{ transform:translateX(100%); }
  .segmented-btn{
    position:relative; z-index:1; flex:1;
    background:none; border:none;
    padding:10px 6px;
    font-size:12.5px; font-weight:600;
    color:var(--cream-dim);
    cursor:pointer;
    transition:color .2s ease;
  }
  .segmented-btn.active{ color:var(--cream); }
  .mode-hint{ font-size:12.5px; color:var(--cream-faint); margin:8px 4px 0; line-height:1.4; }

  /* ---------- add player row ---------- */
  .add-row{
    display:flex; align-items:center; gap:10px;
    background:var(--surface); border:1px solid var(--hairline);
    border-radius:14px; padding:6px 8px 6px 14px;
    margin-bottom:10px;
  }
  .add-row input[type="text"]{
    flex:1; border:none; background:none; outline:none;
    color:var(--cream); font-size:16px; padding:8px 0;
  }
  .add-row input[type="text"]::placeholder{ color:var(--cream-faint); }
  .plus-circle{
    width:30px; height:30px; border-radius:50%; flex-shrink:0;
    background:var(--green); border:none; color:#04380F;
    font-size:19px; font-weight:700; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:transform .1s ease, opacity .15s ease;
  }
  .plus-circle:active{ transform:scale(0.88); }
  .plus-circle:disabled{ opacity:0.3; }

  /* ---------- ios-style grouped list ---------- */
  .ios-list{
    list-style:none; margin:0; padding:0;
    background:var(--surface); border:1px solid var(--hairline);
    border-radius:14px; overflow:hidden;
  }
  .ios-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 14px; min-height:48px;
    border-bottom:1px solid var(--hairline);
  }
  .ios-row:last-child{ border-bottom:none; }
  .ios-row-text{ font-size:15.5px; }
  .played-tag{
    font-family:'IBM Plex Mono', monospace; font-size:11px;
    color:var(--cream-faint); margin-left:8px;
  }
  .minus-circle{
    width:24px; height:24px; border-radius:50%; flex-shrink:0;
    background:var(--red); border:none; color:#fff;
    font-size:16px; font-weight:700; line-height:1; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:transform .1s ease;
  }
  .minus-circle:active{ transform:scale(0.85); }

  .empty-hint{ font-size:14px; color:var(--cream-faint); margin:14px 6px 0; text-align:center; }

  /* ---------- buttons ---------- */
  .primary-btn{
    width:100%; padding:15px; border:none; border-radius:14px;
    background:var(--brass); color:var(--ink);
    font-size:16px; font-weight:700; letter-spacing:0.2px;
    cursor:pointer;
    transition:opacity .12s ease, transform .1s ease;
  }
  .primary-btn:active:not(:disabled){ opacity:0.72; transform:scale(0.99); }
  .primary-btn:disabled{ opacity:0.35; cursor:not-allowed; }

  .text-btn{
    width:100%; padding:13px; border:none; border-radius:14px;
    background:var(--surface); border:1px solid var(--hairline);
    color:var(--cream); font-size:15px; font-weight:500;
    cursor:pointer; transition:background .15s ease, opacity .12s ease;
  }
  .text-btn:active{ opacity:0.6; }
  .text-btn.destructive{ color:var(--red); }

  .btn-stack{ display:flex; flex-direction:column; gap:10px; margin-top:10px; }

  /* ---------- game screen ---------- */
  .tiles{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(168px,1fr));
    gap:12px;
  }
  .tile{
    position:relative;
    background:var(--surface);
    border:1px solid var(--hairline);
    border-radius:16px;
    padding:16px 14px 14px;
    overflow:hidden;
    transition:opacity .3s ease, filter .3s ease;
  }
  .tile.out{ opacity:0.5; filter:grayscale(0.7); }

  .tile-top{ display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:12px; gap:6px; }
  .tile-name{
    font-size:16.5px; font-weight:600;
    word-break:break-word; line-height:1.25;
  }
  .undo-btn{
    width:28px; height:28px; border-radius:50%; flex-shrink:0;
    background:var(--surface-2); border:none; color:var(--cream-dim);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:background .15s ease, transform .1s ease;
  }
  .undo-btn svg{ width:14px; height:14px; }
  .undo-btn:active:not(:disabled){ transform:scale(0.85); }
  .undo-btn:disabled{ opacity:0.25; }

  .cards-row{ display:flex; gap:5px; flex-wrap:wrap; min-height:34px; margin-bottom:14px; }
  .life-card{
    width:19px; height:28px; border-radius:4px;
    background:linear-gradient(135deg, var(--cream), #D9D0BC);
    border:1px solid rgba(0,0,0,0.2);
    transition:transform .35s ease, background .35s ease, opacity .35s ease;
  }
  .life-card.lost{
    background:linear-gradient(135deg, #3a2c22, #241a14);
    transform:rotateY(180deg) translateY(3px);
    opacity:0.45;
  }

  .minus-btn{
    width:100%; padding:10px; border:none; border-radius:10px;
    background:rgba(255,69,58,0.9); color:#fff;
    font-size:13.5px; font-weight:600; cursor:pointer;
    transition:opacity .12s ease, transform .1s ease;
  }
  .minus-btn:active:not(:disabled){ opacity:0.7; transform:scale(0.98); }
  .minus-btn:disabled{ opacity:0.28; cursor:not-allowed; }

  .stamp{
    position:absolute; top:40%; left:50%;
    transform:translate(-50%,-50%) rotate(-16deg);
    font-family:'Fraunces', serif; font-weight:700; font-size:19px;
    color:var(--red); border:2.5px solid var(--red); border-radius:8px;
    padding:2px 9px; letter-spacing:1.5px;
    opacity:0; pointer-events:none; transition:opacity .3s ease;
  }
  .tile.out .stamp{ opacity:0.9; }

  /* ---------- bottom sheets ---------- */
  .sheet-backdrop{
    position:fixed; inset:0; z-index:40;
    background:rgba(0,0,0,0.5);
    opacity:0; pointer-events:none;
    transition:opacity .28s ease;
  }
  .sheet-backdrop.open{ opacity:1; pointer-events:auto; }

  .sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:41;
    max-width:760px; margin:0 auto;
    background:#0E2E22;
    border:1px solid var(--hairline);
    border-bottom:none;
    border-radius:22px 22px 0 0;
    padding:10px 20px calc(24px + env(safe-area-inset-bottom));
    max-height:82vh; overflow-y:auto;
    transform:translateY(105%);
    transition:transform .36s cubic-bezier(.32,.72,0,1);
    box-shadow:0 -10px 40px rgba(0,0,0,0.4);
  }
  .sheet.open{ transform:translateY(0); }
  .sheet-grabber{
    width:36px; height:5px; border-radius:3px;
    background:var(--surface-3); margin:2px auto 14px;
  }
  .sheet-header{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:16px;
  }
  .sheet-title{ font-family:'Fraunces', serif; font-weight:700; font-size:20px; margin:0; }
  .sheet-close{
    width:30px; height:30px; border-radius:50%; border:none;
    background:var(--surface-2); color:var(--cream-dim); font-size:15px;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .sheet-close:active{ transform:scale(0.9); }

  /* stats table */
  .stats-table{ width:100%; border-collapse:collapse; margin:4px 0 4px; }
  .stats-table th, .stats-table td{
    text-align:left; padding:11px 8px;
    border-bottom:1px solid var(--hairline);
    font-size:14px;
  }
  .stats-table th{
    font-size:10.5px; text-transform:uppercase; letter-spacing:0.6px;
    color:var(--cream-faint); font-weight:600;
  }
  .stats-table td.num, .stats-table th.num{ text-align:center; font-family:'IBM Plex Mono', monospace; }
  .stats-table tr:last-child td{ border-bottom:none; }
  .rank-badge{
    display:inline-flex; align-items:center; justify-content:center;
    width:20px; height:20px; border-radius:50%;
    background:rgba(201,162,39,0.18); color:var(--brass-bright);
    font-family:'IBM Plex Mono', monospace; font-size:10.5px; margin-right:8px;
  }
  .win-count{ color:var(--green); font-weight:600; }
  .loss-count{ color:var(--red); font-weight:600; }

  /* winner sheet */
  .winner-body{ text-align:center; padding:14px 4px 4px; }
  .winner-eyebrow{
    font-size:12px; letter-spacing:1.6px; text-transform:uppercase;
    color:var(--brass-bright); margin-bottom:8px; font-weight:600;
  }
  .winner-name{
    font-family:'Fraunces', serif; font-weight:700; font-size:32px; margin:0 0 8px;
  }
  .winner-sub{ font-size:14px; color:var(--cream-dim); margin:0 0 22px; min-height:1px; }
  .sheet.loss-style .winner-eyebrow{ color:#FF8B80; }
  .sheet.loss-style .winner-name{ color:#FF8B80; }

  @media (max-width:420px){
    .tiles{ grid-template-columns:1fr 1fr; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="topbar-titles">
      <h1 class="topbar-title">Schwimmen</h1>
      <p class="topbar-subtitle" id="topbar-subtitle"></p>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" id="nav-newround-btn" type="button" aria-label="Neue Runde" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11a8 8 0 0 0-14.9-4"/><path d="M4 4v4h4"/><path d="M4 13a8 8 0 0 0 14.9 4"/><path d="M20 20v-4h-4"/></svg>
      </button>
      <button class="icon-btn" id="nav-overview-btn" type="button" aria-label="Übersicht">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="20" x2="5" y2="12"/><line x1="12" y1="20" x2="12" y2="5"/><line x1="19" y1="20" x2="19" y2="15"/></svg>
      </button>
    </div>
  </div>
</header>

<main class="content">
  <!-- LOBBY -->
  <section id="lobby-screen" class="screen">

    <div class="section">
      <p class="section-label">Startleben pro Spieler</p>
      <div class="stepper-pill">
        <span class="stepper-label">Leben</span>
        <div class="stepper-controls">
          <button class="stepper-btn" id="lives-minus" type="button" aria-label="Weniger Startleben">−</button>
          <span class="stepper-value" id="lives-value">3</span>
          <button class="stepper-btn" id="lives-plus" type="button" aria-label="Mehr Startleben">+</button>
        </div>
      </div>
    </div>

    <div class="section">
      <p class="section-label">Rundenende</p>
      <div class="segmented" id="mode-toggle">
        <div class="segmented-thumb"></div>
        <button type="button" class="segmented-btn" id="mode-last-btn" data-mode="last">Letzter übrig</button>
        <button type="button" class="segmented-btn" id="mode-firstout-btn" data-mode="firstOut">Erster ohne Leben</button>
      </div>
      <p class="mode-hint" id="mode-hint"></p>
    </div>

    <div class="section">
      <p class="section-label">Spieler</p>
      <div class="add-row">
        <button class="plus-circle" id="add-player-btn" type="button" aria-label="Spieler hinzufügen">+</button>
        <input type="text" id="player-input" placeholder="Name eingeben…" maxlength="20">
      </div>
      <ul class="ios-list" id="player-list"></ul>
      <p class="section-footnote" id="lobby-hint"></p>
    </div>

    <button class="primary-btn" id="start-btn" disabled>Spiel starten</button>

    <div class="btn-stack" id="lobby-secondary-btns" style="display:none;">
      <button class="text-btn destructive" id="lobby-reset-all-btn" type="button">Alles zurücksetzen</button>
    </div>
  </section>

  <!-- GAME -->
  <section id="game-screen" class="screen" style="display:none;">
    <div class="tiles" id="tiles"></div>
  </section>
</main>

<!-- OVERVIEW SHEET -->
<div class="sheet-backdrop" id="overview-backdrop"></div>
<div class="sheet" id="overview-sheet">
  <div class="sheet-grabber"></div>
  <div class="sheet-header">
    <h2 class="sheet-title">Übersicht</h2>
    <button class="sheet-close" id="overview-close-btn" type="button" aria-label="Schließen">✕</button>
  </div>
  <table class="stats-table" id="stats-table">
    <thead>
      <tr>
        <th>Spieler</th>
        <th class="num">Siege</th>
        <th class="num">Verlorene Runden</th>
      </tr>
    </thead>
    <tbody id="stats-tbody"></tbody>
  </table>
  <p class="empty-hint" id="stats-empty-hint" style="display:none;">Noch keine Runde gespielt.</p>

  <div class="btn-stack">
    <button class="text-btn" id="overview-reset-stats-btn" type="button">Statistik zurücksetzen</button>
    <button class="text-btn destructive" id="overview-reset-all-btn" type="button">Alles zurücksetzen</button>
  </div>
</div>

<!-- WINNER SHEET -->
<div class="sheet-backdrop" id="winner-backdrop"></div>
<div class="sheet" id="winner-sheet">
  <div class="sheet-grabber"></div>
  <div class="winner-body">
    <div class="winner-eyebrow" id="winner-eyebrow">Letzter am Tisch</div>
    <h2 class="winner-name" id="winner-name">—</h2>
    <p class="winner-sub" id="winner-sub"></p>
  </div>
  <div class="btn-stack">
    <button class="primary-btn" id="winner-newround-btn" type="button">Neue Runde</button>
    <button class="text-btn" id="winner-overview-btn" type="button">Übersicht</button>
  </div>
</div>

<script>
(function(){
  const STORAGE_KEY = 'schwimmen-state-v2';

  let roster = [];
  let startLives = 3;
  let mode = 'last';
  let round = { active:false, finished:false, mode:'last', specialId:null, players:[] };
  let nextId = 1;
  let currentScreen = 'lobby';

  const MODE_LABELS = {
    last: { tag:'Letzter übrig gewinnt' },
    firstOut: { tag:'Erster ohne Leben beendet die Runde' }
  };

  // ---------- persistence (local only) ----------
  function saveState(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ roster, startLives, mode, round, nextId }));
    }catch(e){}
  }
  function loadLocalState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return false;
      const data = JSON.parse(raw);
      if(data && Array.isArray(data.roster)){
        roster = data.roster;
        startLives = data.startLives || 3;
        mode = data.mode === 'firstOut' ? 'firstOut' : 'last';
        round = data.round || { active:false, finished:false, mode:'last', specialId:null, players:[] };
        nextId = data.nextId || (roster.length + 1);
        return true;
      }
    }catch(e){}
    return false;
  }
  function clearAll(){
    roster = [];
    round = { active:false, finished:false, mode:'last', specialId:null, players:[] };
    startLives = 3;
    mode = 'last';
    try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
  }

  // ---------- elements ----------
  const lobbyScreen = document.getElementById('lobby-screen');
  const gameScreen = document.getElementById('game-screen');

  const livesValueEl = document.getElementById('lives-value');
  const playerInput = document.getElementById('player-input');
  const playerListEl = document.getElementById('player-list');
  const startBtn = document.getElementById('start-btn');
  const lobbyHint = document.getElementById('lobby-hint');
  const lobbySecondaryBtns = document.getElementById('lobby-secondary-btns');

  const tilesEl = document.getElementById('tiles');
  const topbarSubtitle = document.getElementById('topbar-subtitle');
  const navNewRoundBtn = document.getElementById('nav-newround-btn');
  const navOverviewBtn = document.getElementById('nav-overview-btn');

  const winnerNameEl = document.getElementById('winner-name');
  const statsTbody = document.getElementById('stats-tbody');
  const statsEmptyHint = document.getElementById('stats-empty-hint');

  const overviewSheet = document.getElementById('overview-sheet');
  const overviewBackdrop = document.getElementById('overview-backdrop');
  const winnerSheet = document.getElementById('winner-sheet');
  const winnerBackdrop = document.getElementById('winner-backdrop');

  // ---------- sheet helpers ----------
  function openSheet(sheet, backdrop){
    backdrop.classList.add('open');
    sheet.classList.add('open');
  }
  function closeSheet(sheet, backdrop){
    backdrop.classList.remove('open');
    sheet.classList.remove('open');
  }
  overviewBackdrop.addEventListener('click', ()=> closeSheet(overviewSheet, overviewBackdrop));
  winnerBackdrop.addEventListener('click', ()=> closeSheet(winnerSheet, winnerBackdrop));

  // ---------- screen switching ----------
  function showScreen(name){
    currentScreen = name;
    lobbyScreen.style.display = name === 'lobby' ? 'block' : 'none';
    gameScreen.style.display = name === 'game' ? 'block' : 'none';
    navNewRoundBtn.style.display = name === 'game' ? 'flex' : 'none';
    if(name === 'lobby'){
      topbarSubtitle.textContent = roster.length > 0 ? roster.length + ' Spieler gespeichert' : 'Spieler & Regeln festlegen';
    }
  }

  // ---------- lobby ----------
  document.getElementById('lives-minus').addEventListener('click', ()=>{
    startLives = Math.max(1, startLives - 1);
    livesValueEl.textContent = startLives;
    saveState();
  });
  document.getElementById('lives-plus').addEventListener('click', ()=>{
    startLives = Math.min(9, startLives + 1);
    livesValueEl.textContent = startLives;
    saveState();
  });

  const modeToggle = document.getElementById('mode-toggle');
  const modeLastBtn = document.getElementById('mode-last-btn');
  const modeFirstOutBtn = document.getElementById('mode-firstout-btn');
  const modeHint = document.getElementById('mode-hint');

  function syncModeUI(){
    modeToggle.classList.toggle('mode-firstOut', mode === 'firstOut');
    modeLastBtn.classList.toggle('active', mode === 'last');
    modeFirstOutBtn.classList.toggle('active', mode === 'firstOut');
    modeHint.textContent = mode === 'last'
      ? 'Die Runde läuft weiter, bis nur noch ein Spieler Leben übrig hat. Der Rest kassiert je eine verlorene Runde.'
      : 'Sobald der erste Spieler bei 0 Leben landet, endet die Runde sofort. Nur dieser Spieler bekommt eine Niederlage, alle anderen einen Sieg.';
  }
  function setMode(newMode){
    mode = newMode;
    syncModeUI();
    saveState();
  }
  modeLastBtn.addEventListener('click', ()=> setMode('last'));
  modeFirstOutBtn.addEventListener('click', ()=> setMode('firstOut'));

  function renderLobby(){
    livesValueEl.textContent = startLives;
    syncModeUI();
    playerListEl.innerHTML = '';
    roster.forEach(p=>{
      const li = document.createElement('li');
      li.className = 'ios-row';
      const span = document.createElement('span');
      span.className = 'ios-row-text';
      span.textContent = p.name;
      if((p.wins||0) + (p.losses||0) > 0){
        const tag = document.createElement('span');
        tag.className = 'played-tag';
        tag.textContent = '(' + p.wins + 'S / ' + p.losses + 'N)';
        span.appendChild(tag);
      }
      const btn = document.createElement('button');
      btn.className = 'minus-circle';
      btn.type = 'button';
      btn.setAttribute('aria-label', 'Entfernen: ' + p.name);
      btn.textContent = '−';
      btn.addEventListener('click', ()=>{
        roster = roster.filter(x=>x.id !== p.id);
        saveState();
        renderLobby();
      });
      li.appendChild(span);
      li.appendChild(btn);
      playerListEl.appendChild(li);
    });

    startBtn.disabled = roster.length < 2;
    const alreadyPlayed = roster.some(p=>(p.wins||0)+(p.losses||0) > 0);
    startBtn.textContent = alreadyPlayed ? 'Neue Runde starten' : 'Spiel starten';
    lobbyHint.textContent = roster.length < 2
      ? 'Mit Enter bestätigen. Mindestens 2 Spieler nötig.'
      : 'Änderungen möglich, bevor die Runde startet.';
    lobbySecondaryBtns.style.display = roster.length > 0 ? 'flex' : 'none';

    if(currentScreen === 'lobby'){
      topbarSubtitle.textContent = roster.length > 0 ? roster.length + ' Spieler gespeichert' : 'Spieler & Regeln festlegen';
    }
  }

  function addPlayerFromInput(){
    const name = playerInput.value.trim();
    if(!name) return;
    roster.push({ id: nextId++, name, wins:0, losses:0 });
    playerInput.value = '';
    saveState();
    renderLobby();
    playerInput.focus();
  }

  document.getElementById('add-player-btn').addEventListener('click', addPlayerFromInput);
  playerInput.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter'){ e.preventDefault(); addPlayerFromInput(); }
  });

  startBtn.addEventListener('click', ()=>{
    if(roster.length < 2) return;
    round = {
      active: true,
      finished: false,
      mode: mode,
      specialId: null,
      players: roster.map(r => ({ id:r.id, lives:startLives, maxLives:startLives, out:false }))
    };
    saveState();
    goToGame();
  });

  document.getElementById('lobby-reset-all-btn').addEventListener('click', ()=>{
    if(confirm('Alle Spieler und die gesamte Statistik unwiderruflich löschen?')){
      clearAll();
      renderLobby();
      showScreen('lobby');
    }
  });

  // ---------- game ----------
  function goToGame(){
    closeSheet(winnerSheet, winnerBackdrop);
    renderTiles();
    showScreen('game');
    if(round.finished) showWinnerOverlay();
  }

  function renderTiles(){
    tilesEl.innerHTML = '';
    const aliveCount = round.players.filter(p=>!p.out).length;
    const roundMode = round.mode === 'firstOut' ? 'firstOut' : 'last';
    if(currentScreen === 'game' || true){
      topbarSubtitle.textContent = aliveCount + ' von ' + round.players.length + ' im Spiel · ' + MODE_LABELS[roundMode].tag;
    }

    round.players.forEach(rp=>{
      const rosterPlayer = roster.find(r=>r.id === rp.id);
      const displayName = rosterPlayer ? rosterPlayer.name : '?';

      const tile = document.createElement('div');
      tile.className = 'tile' + (rp.out ? ' out' : '');

      const top = document.createElement('div');
      top.className = 'tile-top';
      const name = document.createElement('div');
      name.className = 'tile-name';
      name.textContent = displayName;
      const undoBtn = document.createElement('button');
      undoBtn.className = 'undo-btn';
      undoBtn.type = 'button';
      undoBtn.title = 'Letztes Leben zurückgeben';
      undoBtn.setAttribute('aria-label', 'Leben zurückgeben für ' + displayName);
      undoBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10a6 6 0 0 1 0 12h-2"/></svg>';
      undoBtn.disabled = rp.lives >= rp.maxLives || round.finished;
      undoBtn.addEventListener('click', ()=> undoLife(rp.id));
      top.appendChild(name);
      top.appendChild(undoBtn);

      const cardsRow = document.createElement('div');
      cardsRow.className = 'cards-row';
      for(let i=0; i<rp.maxLives; i++){
        const card = document.createElement('div');
        card.className = 'life-card' + (i >= rp.lives ? ' lost' : '');
        cardsRow.appendChild(card);
      }

      const minusBtn = document.createElement('button');
      minusBtn.className = 'minus-btn';
      minusBtn.type = 'button';
      minusBtn.textContent = '− Leben abziehen';
      minusBtn.disabled = rp.out || round.finished;
      minusBtn.addEventListener('click', ()=> loseLife(rp.id));

      const stamp = document.createElement('div');
      stamp.className = 'stamp';
      stamp.textContent = 'RAUS';

      tile.appendChild(top);
      tile.appendChild(cardsRow);
      tile.appendChild(minusBtn);
      tile.appendChild(stamp);
      tilesEl.appendChild(tile);
    });
  }

  function loseLife(id){
    const rp = round.players.find(x=>x.id === id);
    if(!rp || rp.out || round.finished) return;
    rp.lives = Math.max(0, rp.lives - 1);
    let justEliminated = false;
    if(rp.lives === 0){ rp.out = true; justEliminated = true; }
    saveState();
    renderTiles();
    if(justEliminated) checkRoundEnd(rp.id);
  }

  function undoLife(id){
    const rp = round.players.find(x=>x.id === id);
    if(!rp || round.finished) return;
    rp.lives = Math.min(rp.maxLives, rp.lives + 1);
    if(rp.lives > 0) rp.out = false;
    saveState();
    renderTiles();
  }

  function checkRoundEnd(justOutId){
    if(round.finished) return;
    const roundMode = round.mode === 'firstOut' ? 'firstOut' : 'last';

    if(roundMode === 'firstOut'){
      round.finished = true;
      round.specialId = justOutId;
      round.players.forEach(rp=>{
        const rosterPlayer = roster.find(r=>r.id === rp.id);
        if(!rosterPlayer) return;
        if(rp.id === justOutId){ rosterPlayer.losses = (rosterPlayer.losses || 0) + 1; }
        else { rosterPlayer.wins = (rosterPlayer.wins || 0) + 1; }
      });
      saveState();
      renderTiles();
      showWinnerOverlay();
      return;
    }

    const alive = round.players.filter(p=>!p.out);
    if(alive.length === 1 && round.players.length > 1){
      round.finished = true;
      round.specialId = alive[0].id;
      round.players.forEach(rp=>{
        const rosterPlayer = roster.find(r=>r.id === rp.id);
        if(!rosterPlayer) return;
        if(rp.id === round.specialId){ rosterPlayer.wins = (rosterPlayer.wins || 0) + 1; }
        else { rosterPlayer.losses = (rosterPlayer.losses || 0) + 1; }
      });
      saveState();
      renderTiles();
      showWinnerOverlay();
    }
  }

  function showWinnerOverlay(){
    const roundMode = round.mode === 'firstOut' ? 'firstOut' : 'last';
    const rosterPlayer = roster.find(r=>r.id === round.specialId);
    const displayName = rosterPlayer ? rosterPlayer.name : '—';
    const winnerEyebrow = document.getElementById('winner-eyebrow');
    const winnerSub = document.getElementById('winner-sub');

    if(roundMode === 'firstOut'){
      winnerSheet.classList.add('loss-style');
      winnerEyebrow.textContent = 'Zuerst ohne Leben';
      winnerNameEl.textContent = displayName;
      const others = round.players.length - 1;
      winnerSub.textContent = others > 1
        ? 'Die anderen ' + others + ' Spieler gewinnen die Runde.'
        : 'Der andere Spieler gewinnt die Runde.';
    } else {
      winnerSheet.classList.remove('loss-style');
      winnerEyebrow.textContent = 'Letzter am Tisch';
      winnerNameEl.textContent = displayName;
      winnerSub.textContent = '';
    }
    openSheet(winnerSheet, winnerBackdrop);
  }

  navNewRoundBtn.addEventListener('click', ()=>{
    const proceed = round.finished || confirm('Aktuelle Runde abbrechen und zurück zur Spielerliste?');
    if(!proceed) return;
    closeSheet(winnerSheet, winnerBackdrop);
    renderLobby();
    showScreen('lobby');
  });

  document.getElementById('winner-newround-btn').addEventListener('click', ()=>{
    closeSheet(winnerSheet, winnerBackdrop);
    renderLobby();
    showScreen('lobby');
  });
  document.getElementById('winner-overview-btn').addEventListener('click', ()=>{
    closeSheet(winnerSheet, winnerBackdrop);
    renderOverview();
    openSheet(overviewSheet, overviewBackdrop);
  });

  // ---------- overview ----------
  function renderOverview(){
    const sorted = [...roster].sort((a,b)=>{
      const bw = (b.wins||0) - (a.wins||0);
      if(bw !== 0) return bw;
      return (a.losses||0) - (b.losses||0);
    });

    statsTbody.innerHTML = '';
    if(sorted.length === 0){
      statsEmptyHint.style.display = 'block';
    } else {
      statsEmptyHint.style.display = 'none';
      sorted.forEach((p, idx)=>{
        const tr = document.createElement('tr');

        const nameTd = document.createElement('td');
        const badge = document.createElement('span');
        badge.className = 'rank-badge';
        badge.textContent = idx + 1;
        nameTd.appendChild(badge);
        nameTd.appendChild(document.createTextNode(p.name));

        const winsTd = document.createElement('td');
        winsTd.className = 'num win-count';
        winsTd.textContent = p.wins || 0;

        const lossTd = document.createElement('td');
        lossTd.className = 'num loss-count';
        lossTd.textContent = p.losses || 0;

        tr.appendChild(nameTd);
        tr.appendChild(winsTd);
        tr.appendChild(lossTd);
        statsTbody.appendChild(tr);
      });
    }
  }

  navOverviewBtn.addEventListener('click', ()=>{
    renderOverview();
    openSheet(overviewSheet, overviewBackdrop);
  });
  document.getElementById('overview-close-btn').addEventListener('click', ()=>{
    closeSheet(overviewSheet, overviewBackdrop);
  });

  document.getElementById('overview-reset-stats-btn').addEventListener('click', ()=>{
    if(roster.length === 0) return;
    if(confirm('Siege und verlorene Runden für alle Spieler auf 0 zurücksetzen?')){
      roster.forEach(p=>{ p.wins = 0; p.losses = 0; });
      saveState();
      renderOverview();
      renderLobby();
    }
  });

  document.getElementById('overview-reset-all-btn').addEventListener('click', ()=>{
    if(confirm('Alle Spieler und die gesamte Statistik unwiderruflich löschen?')){
      clearAll();
      closeSheet(overviewSheet, overviewBackdrop);
      renderLobby();
      showScreen('lobby');
    }
  });

  // ---------- init ----------
  const restored = loadLocalState();
  if(restored && round.active && round.players.length > 0){
    renderLobby();
    goToGame();
  } else {
    renderLobby();
    showScreen('lobby');
  }

  // ---------- PWA: service worker ----------
  if('serviceWorker' in navigator){
    window.addEventListener('load', ()=>{
      navigator.serviceWorker.register('./sw.js').catch(()=>{});
    });
  }
})();
</script>

</body>
</html>
